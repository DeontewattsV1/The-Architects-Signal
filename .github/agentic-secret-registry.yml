version: 1
registry_name: agentic-secret-registry
owner: DeontewattsV1
repository: The-Architects-Signal
purpose: >-
  Metadata-only registry for GitHub Actions secrets, variables, workflow failure
  triggers, configuration drift detection, rotation rules, and agentic remediation.
  This file must never contain real secret values.

policy:
  never_store_secret_values: true
  metadata_only: true
  default_secret_max_age_days: 180
  critical_secret_max_age_days: 90
  default_agent_mode: dry_run
  require_human_approval_for_critical: true
  prefer_oidc_for_cloud_credentials: true
  block_plaintext_credentials_in_commits: true
  open_issue_on_expired_secret: true
  open_pr_on_config_drift: true
  max_auto_fix_attempts: 2
  cooldown_minutes: 60

repository_context:
  owner_login: DeontewattsV1
  repo_name: The-Architects-Signal
  default_branch: main
  environments:
    - development
    - staging
    - production
  protected_branches:
    - main
  watched_paths:
    - .github/workflows/**
    - .github/dependabot.yml
    - .github/agentic-secret-registry.yml
    - CODEOWNERS
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - pyproject.toml
    - requirements.txt
    - Dockerfile
    - docker-compose.yml

secrets:
