    kind: feature_flag
    value_sensitivity: public
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: boolean
    allowed_values:
      - "true"
      - "false"
    default_value: "true"
    change_requires_review: true
    review_team: "@DeontewattsV1/maintainers"
    rollback_value: "true"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

  - id: var.secret.max_age_default
    github_name: SECRET_MAX_AGE_DAYS_DEFAULT
    kind: threshold
    value_sensitivity: public
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: integer
    default_value: "180"
    validation_regex: "^[0-9]+$"
    change_requires_review: true
    review_team: "@DeontewattsV1/security"
    rollback_value: "180"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

  - id: var.secret.critical_max_age
    github_name: SECRET_CRITICAL_MAX_AGE_DAYS
    kind: threshold
    value_sensitivity: public
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: integer
    default_value: "90"
    validation_regex: "^[0-9]+$"
    change_requires_review: true
    review_team: "@DeontewattsV1/security"
    rollback_value: "90"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

  - id: var.config.watch_paths
    github_name: CONFIG_WATCH_PATHS
    kind: config
