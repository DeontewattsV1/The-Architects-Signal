    allowed_values:
      - "true"
      - "false"
    default_value: "false"
    change_requires_review: true
    review_team: "@DeontewattsV1/security"
    rollback_value: "false"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

triggers:
  - trigger_id: trigger.workflow.failure
    event: workflow_run
    activity_types:
      - completed
    condition: failure
    severity: error
    dedupe_key: "workflow:${workflow_name}:${failed_job}:${error_hash}"
    open_issue: true
    open_pr: true
    fail_check: false
    rollback_allowed: false
    requires_approval: false
    cooldown_minutes: 60
    max_auto_fix_attempts: 2
    notify_team: "@DeontewattsV1/maintainers"
    evidence_to_collect:
      - workflow_name
      - run_id
      - run_url
      - failed_job
      - failed_step
      - changed_files
      - error_excerpt
      - actor
      - head_sha
    success_criteria:
      - workflow_passes_on_rerun
      - no_new_failed_jobs

  - trigger_id: trigger.github.config.changed
    event: pull_request
    activity_types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
      - .github/agentic-secret-registry.yml
      - CODEOWNERS
      - package.json
      - package-lock.json
      - pnpm-lock.yaml
      - pyproject.toml
      - requirements.txt
      - Dockerfile
      - docker-compose.yml
    condition: config_changed
    severity: warning
    dedupe_key: "config:${pull_request_number}:${head_sha}"
    open_issue: false
    open_pr: false
    fail_check: true
    rollback_allowed: false
    requires_approval: true
    cooldown_minutes: 30
    max_auto_fix_attempts: 1
    notify_team: "@DeontewattsV1/maintainers"
    evidence_to_collect:
      - changed_files
      - diff_summary
      - workflow_syntax_check
      - permission_delta
      - secret_reference_delta
    success_criteria:
      - config_lint_passes
      - required_review_approved

  - trigger_id: trigger.secret.rotation
    event: schedule
    condition: secret_expired
    severity: critical
    dedupe_key: "secret:${github_name}:${age_days}"
    open_issue: true
    open_pr: false
    fail_check: false
    rollback_allowed: false
    requires_approval: true
    cooldown_minutes: 1440
    max_auto_fix_attempts: 0
    notify_team: "@DeontewattsV1/security"
    evidence_to_collect:
      - secret_name
      - scope_level
      - repository
      - environment
      - updated_at
      - age_days
      - max_age_days
      - allowed_workflows
    success_criteria:
      - secret_updated_at_changed
      - verification_probe_passes

  - trigger_id: trigger.variable.drift
    event: schedule
    condition: variable_drift
    severity: warning
    dedupe_key: "variable:${github_name}:${current_value_hash}"
    open_issue: true
    open_pr: true
    fail_check: false
    rollback_allowed: true
    requires_approval: false
    cooldown_minutes: 1440
    max_auto_fix_attempts: 1
    notify_team: "@DeontewattsV1/maintainers"
    evidence_to_collect:
      - variable_name
      - expected_default
      - current_value_hash
      - allowed_values
      - validation_result
    success_criteria:
      - variable_matches_policy
      - drift_issue_closed

agent_actions:
  on_workflow_failure:
    - classify_error
    - collect_logs
    - check_recent_config_changes
    - search_known_fix_patterns
    - open_issue_with_evidence
    - open_pr_when_safe
  on_config_change:
    - lint_yaml
    - validate_workflow_permissions
    - detect_new_secret_references
    - require_review_for_sensitive_paths
    - block_if_untrusted_context
  on_secret_expiration:
    - compute_secret_age_from_metadata
    - open_rotation_issue
    - notify_security_team
    - block_auto_rotation_unless_enabled
  on_variable_drift:
    - compare_against_allowed_values
    - restore_safe_default_when_allowed
    - open_pr_with_rollback

copy_paste_notes:
  safe_to_commit: true
  contains_secret_values: false
  next_file_to_add: .github/workflows/agentic-failure-and-config-guard.yml
