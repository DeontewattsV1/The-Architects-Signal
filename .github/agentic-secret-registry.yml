    can_auto_rotate: false
    requires_human_approval: true
    approval_team: "@DeontewattsV1/maintainers"
    allowed_workflows:
      - .github/workflows/agentic-remediation.yml
      - .github/workflows/release.yml
    allowed_branches:
      - main
    fork_access_allowed: false
    dependabot_access_allowed: false
    oidc_replacement_available: false
    rotation_runbook: docs/runbooks/rotate-github-app.md
    exposure_response:
      - revoke_app_credentials
      - rotate_github_secret
      - open_security_issue
      - block_deploy
    audit_labels:
      - agentic
      - github-app
      - production
    notes: "GitHub App identifier only; keep app private key in GH_APP_PRIVATE_KEY."

