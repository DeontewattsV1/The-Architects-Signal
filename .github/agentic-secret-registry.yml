variables:
  - id: var.agent.mode
    github_name: AGENT_MODE
    kind: config
    value_sensitivity: internal
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: string
    allowed_values:
      - notify_only
      - dry_run
      - auto_fix
      - auto_merge_safe
    default_value: dry_run
    current_value_hash: null
    change_requires_review: true
    review_team: "@DeontewattsV1/maintainers"
    rollback_value: dry_run
    drift_detection: enabled
    agent_action_on_invalid: open_pr
    notes: "Controls how much autonomy the remediation workflow has."

  - id: var.agent.max_attempts
    github_name: AGENT_MAX_ATTEMPTS
    kind: threshold
    value_sensitivity: public
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: integer
    default_value: "2"
    validation_regex: "^[0-9]+$"
    change_requires_review: true
    review_team: "@DeontewattsV1/maintainers"
    rollback_value: "2"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

  - id: var.agent.cooldown_minutes
    github_name: AGENT_COOLDOWN_MINUTES
    kind: threshold
    value_sensitivity: public
    scope_level: repository
    repository: The-Architects-Signal
    type_hint: integer
    default_value: "60"
    validation_regex: "^[0-9]+$"
    change_requires_review: false
    review_team: "@DeontewattsV1/maintainers"
    rollback_value: "60"
    drift_detection: enabled
    agent_action_on_invalid: open_pr

  - id: var.agent.open_issues
